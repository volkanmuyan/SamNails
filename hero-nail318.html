<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sam Nails — Hero Section</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page shell ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0505;
      padding: clamp(1rem, 4vw, 2.5rem);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ════════════════════════════════
       HERO CARD
    ════════════════════════════════ */
    .hero {
      width: 100%;
      max-width: 900px;
      min-height: clamp(320px, 48vw, 460px);
      border-radius: 22px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 44% 56%;
      background: #8b0000;
      position: relative;
    }

    /* ── Left column ── */
    .hero__left {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(1.5rem, 3.5vw, 2.5rem) clamp(1.5rem, 3vw, 2.25rem);
      /* Bleed gradient masks photo edge that peeks under overlap */
      background: linear-gradient(
        to right,
        #8b0000 82%,
        rgba(139, 0, 0, 0) 100%
      );
    }

    .hero__heading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 4.2vw, 3.25rem);
      font-weight: 400;
      line-height: 1.04;
      letter-spacing: -0.015em;
      color: #ffffff;
      margin-bottom: clamp(0.75rem, 1.8vw, 1.1rem);
    }

    .hero__sub {
      font-size: clamp(0.75rem, 1.15vw, 0.85rem);
      font-weight: 300;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.7);
      max-width: 260px;
      margin-bottom: clamp(1.25rem, 2.5vw, 1.9rem);
    }

    /* ── CTA Button ── */
    .hero__cta {
      display: inline-flex;
      align-items: center;
      gap: 0;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      padding: 5px 5px 5px 18px;
      cursor: pointer;
      background: transparent;
      text-decoration: none;
      width: fit-content;
      transition: border-color 0.22s ease, background 0.22s ease;
    }

    .hero__cta:hover {
      border-color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.06);
    }

    .hero__cta:hover .hero__cta-icon {
      transform: scale(1.08);
    }

    .hero__cta-text {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: clamp(0.72rem, 1.1vw, 0.8rem);
      font-weight: 400;
      color: #ffffff;
      white-space: nowrap;
      margin-right: 12px;
    }

    .hero__cta-icon {
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s ease;
    }

    .hero__cta-icon svg {
      width: 13px;
      height: 13px;
      display: block;
    }

    /* ── Right column (photo) ── */
    .hero__right {
      position: relative;
      overflow: hidden;
    }

    .hero__right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 35% top;
      display: block;
    }

    /* Soft left-edge gradient so photo blends into the red */
    .hero__right::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(139, 0, 0, 0.6) 0%,
        rgba(139, 0, 0, 0.08) 28%,
        transparent 55%
      );
      pointer-events: none;
    }

    /* ════════════════════════════════
       RESPONSIVE — tablet / mobile
    ════════════════════════════════ */
    @media (max-width: 600px) {
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: 220px auto;
        min-height: auto;
        border-radius: 18px;
      }

      /* Photo moves to top on mobile */
      .hero__right {
        grid-row: 1;
        grid-column: 1;
      }

      .hero__right img { object-position: center 20%; }

      /* Overlay fades photo bottom into red */
      .hero__right::after {
        background: linear-gradient(
          to bottom,
          transparent 35%,
          rgba(139, 0, 0, 0.85) 100%
        );
      }

      .hero__left {
        grid-row: 2;
        grid-column: 1;
        background: #8b0000;
        padding: 1.5rem 1.5rem 2rem;
      }

      .hero__sub { max-width: 100%; }
    }

    @media (min-width: 601px) and (max-width: 820px) {
      .hero { grid-template-columns: 48% 52%; }

      .hero__heading { font-size: clamp(1.7rem, 3.8vw, 2.4rem); }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════
     HERO SECTION
════════════════════════════════ -->
<section class="hero" id="hero-nail318" aria-label="Hero">

  <!-- Left: text + CTA (populated from JS / JSON below) -->
  <div class="hero__left">
    <h1 class="hero__heading" id="js-heading"></h1>
    <p  class="hero__sub"     id="js-sub"></p>
    <a  class="hero__cta"     id="js-cta" href="#booking">
      <span class="hero__cta-text" id="js-cta-text"></span>
      <span class="hero__cta-icon" aria-hidden="true">
        <!-- Arrow up-right, colored to match dark red -->
        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M2.5 11.5L11.5 2.5M11.5 2.5H5M11.5 2.5V9"
            stroke="#8b0000"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
    </a>
  </div>

  <!-- Right: model photo -->
  <div class="hero__right">
    <img
      src="https://images.pexels.com/photos/3997379/pexels-photo-3997379.jpeg?auto=compress&cs=tinysrgb&w=900"
      alt="Sam Nails Leuven — nail art model"
      loading="eager"
      fetchpriority="high"
    />
  </div>

</section>

<!-- ════════════════════════════════
     JSON DATA MODEL + RENDER
════════════════════════════════ -->
<script>
  const heroData = {
    "hero_section": {
      "heading":    "Jouw nagels verdienen het beste",
      "subheading": "Premium nagelverzorging in het hart van Leuven. Jouw stijl, onze zorg.",
      "cta_text":   "Maak een afspraak"
    }
  };

  (function render(data) {
    const { heading, subheading, cta_text } = data.hero_section;
    document.getElementById('js-heading').textContent  = heading;
    document.getElementById('js-sub').textContent      = subheading;
    document.getElementById('js-cta-text').textContent = cta_text;
  })(heroData);
</script>

</body>
</html>
